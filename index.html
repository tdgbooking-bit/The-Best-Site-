<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ENTER BUILDING</title>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="src/styles/main.css">
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                width: 100%;
                overflow: hidden;
                background: none;
                font-family: 'UnifrakturCook', 'Cinzel', 'Playfair Display', serif;
                letter-spacing: 2px;
                text-transform: uppercase;
                font-size: 28px;
            }
            .bg-video {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                z-index: -1;
            }
            .center {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: 'UnifrakturCook', 'Cinzel', serif;
                letter-spacing: 2px;
                text-transform: uppercase;
            }
            .enter-btn.chrome-hearts {
                font-family: 'UnifrakturCook', 'Cinzel', serif;
                font-size: 96px;
                letter-spacing: 3px;
                color: white;
                background: none;
                border: none;
                padding: 0;
                text-transform: uppercase;
                text-shadow: 0 0 16px rgba(255,255,255,0.7);
                cursor: pointer;
                animation: enter-slide-up 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            }
            @keyframes enter-slide-up {
                0% {
                    opacity: 0;
                    transform: translate(-50%, 100vh);
                }
                100% {
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
            }
            label, input, button, .subscribe-title, #history-message {
                font-family: 'UnifrakturCook', 'Cinzel', serif !important;
                font-size: 1.5em;
                letter-spacing: 2px;
                text-transform: uppercase;
            }
        </style>
</head>
<body>
                <div class="video-bg">
                    <video autoplay muted loop playsinline>
                        <source src="src/assets/iStock-2253622537.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
        <div class="center" id="main-center">
            <button class="enter-btn chrome-hearts" id="enter-btn" style="display: block; margin: 0 auto; background: none; border: none; box-shadow: none;">ENTER</button>
        </div>
        <div id="chromehearts-preorder" style="display:none;">
            <h1 style="font-family:'UnifrakturCook','Cinzel',serif;font-size:3em;letter-spacing:3px;">Chrome Hearts Preorder Set</h1>
            <div class="product" style="max-width:400px;margin:2em auto;background:rgba(255,255,255,0.08);padding:2em;border-radius:1em;text-align:center;">
                <img src="src/assets/chromehearts-set.jpg" alt="Chrome Hearts Set" style="width:100%;max-width:300px;border-radius:0.5em;box-shadow:0 0 16px rgba(0,0,0,0.3);margin-bottom:1em;">
                <h2>Chrome Hearts Full Set</h2>
                <p style="font-size:1.2em;">Preorder the exclusive Chrome Hearts set. Limited quantities available!</p>
                <p style="font-size:1.5em;font-weight:bold;">$250</p>
                <button id="preorder-btn" class="button" style="font-size:1.2em;padding:0.7em 2em;">Preorder Now</button>
            </div>
        </div>
        <script>
            const enterBtn = document.getElementById('enter-btn');
            const mainCenter = document.getElementById('main-center');
            const preorderSection = document.getElementById('chromehearts-preorder');
            enterBtn.addEventListener('click', function() {
                mainCenter.style.display = 'none';
                preorderSection.style.display = 'block';
            });
            // Payment button handler placeholder
            document.addEventListener('DOMContentLoaded', function() {
                const preorderBtn = document.getElementById('preorder-btn');
                if (preorderBtn) {
                    preorderBtn.addEventListener('click', function() {
                        alert('Payment processing coming soon!');
                    });
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
        <script>
            (function(){
                emailjs.init("hJ8K2LmP9X");
            })();
        </script>
        <script type="text/javascript"
                src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
        </script>
        <script type="text/javascript">
             (function(){
                    emailjs.init({
                        publicKey: "3VlrPXqt0yK2UJXEH",
                    });
             })();
        </script>
</body>
</html>
