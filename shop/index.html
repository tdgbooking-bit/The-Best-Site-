<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHOP — SUBLIMINAL WORLD</title>
        <link rel="stylesheet" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
        <style>
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
                width: 100vw;
                min-height: 100vh;
                overflow-x: hidden;
                background: transparent;
            }
            .video-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
                overflow: hidden;
            }
            .video-bg video {
                width: 100vw;
                height: 100vh;
                object-fit: cover;
                min-width: 100vw;
                min-height: 100vh;
                position: absolute;
                top: 0;
                left: 0;
            }
        </style>
</head>
<body>
<div class="video-bg">
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="/iStock-2253622537.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<header class="shop-header">
    <h1 class="chrome-hearts">SHOP</h1>
</header>

<section class="product-grid">

    <div class="product">
        <img src="images/product1.jpg" alt="Product 1">
        <div class="product-info">
            <p class="name">DISTRESSED LOGO TEE</p>
            <p class="price">$120</p>
        </div>
    </div>

    <div class="product">
        <img src="images/product2.jpg" alt="Product 2">
        <div class="product-info">
            <p class="name">SUBLIMINAL HOODIE</p>
            <p class="price">$220</p>
        </div>
    </div>

    <div class="product">
        <img src="images/product3.jpg" alt="Product 3">
        <div class="product-info">
            <p class="name">LIMITED BELT</p>
            <p class="price">$350</p>
        </div>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
