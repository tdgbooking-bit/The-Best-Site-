<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KIDS — SUBLIMINAL WORLD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <meta name="description" content="Shop kids' fashion at Subliminal World. Premium tees, hoodies, and more.">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=UnifrakturCook:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100vw;
      min-height: 100vh;
      overflow-x: hidden;
      background: transparent;
    }
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }
    .video-bg video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      min-width: 100vw;
      min-height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
<nav style="position:relative; z-index:2; background:#111; padding:20px; text-align:center;">
  <a href="kids.html" style="color:#fff; text-decoration:none; font-size:18px; margin:0 16px;">Kids</a>
  <a href="men.html" style="color:#fff; text-decoration:none; font-size:18px; margin:0 16px;">Men</a>
  <a href="women.html" style="color:#fff; text-decoration:none; font-size:18px; margin:0 16px;">Women</a>
</nav>
<section class="product-grid">
  <a href="product-kids-flame.html" class="product-card">

    <div class="product-card" onclick="this.classList.toggle('flip')">
      <div class="card-inner">
        <div class="card-front">
          <img src="../images/frontofblueandpink hoodie.png" alt="Subliminal Hoodie Front">
        </div>
        <div class="card-back">
          <img src="../images/back of blue and pink hoodie .png" alt="Subliminal Hoodie Back">
        </div>
      </div>
    </div>

    <p class="product-name">Kids Subliminal Flame Sweat Suits</p>
    <p class="product-price">$100</p>
  </a>
  <a href="product-kids-tee-01.html" class="product-card">
    <img src="images/kids-tee-01.png" alt="Kids Tee 01" style="max-width:220px; height:auto;" onerror="this.src='https://via.placeholder.com/300x400?text=Kids+Tee+01';">
    <p class="product-name">SUBLIMINAL KIDS TEE 01</p>
    <p class="product-price">$60</p>
  </a>
  <a href="product-kids-hoodie-01.html" class="product-card">
    <img src="images/kids-hoodie-01.png" alt="Kids Hoodie 01" style="max-width:220px; height:auto;" onerror="this.src='https://via.placeholder.com/300x400?text=Kids+Hoodie+01';">
    <p class="product-name">SUBLIMINAL KIDS HOODIE 01</p>
    <p class="product-price">$85</p>
  </a>
  <a href="product-kids-subliminal-vol1.html" class="product-card">
    <img src="../images/New Jacket.png" alt="Kids Subliminal Vol 1 Sweat Suite" style="max-width:220px; height:auto;" onerror="this.src='https://via.placeholder.com/300x400?text=Subliminal+Vol+1';">
    <p class="product-name">Kids Subliminal Vol 1 Sweat Suites</p>
    <p class="product-price">$120</p>
  </a>
</section>
<header class="shop-header">
  <h1 class="chrome-hearts">KIDS</h1>
</header>

<section class="product-grid">

  <div>
    <img src="../images/kids-hoodie1.png" alt="Subliminal Kids Hoodie">
    <h3>Subliminal Kids Hoodie</h3>
    <p>$65.00</p>
    <button>Add to Cart</button>
  </div>

  <div>
    <img src="../images/kids-set1.png" alt="Subliminal Kids Set">
    <h3>Subliminal Kids Set</h3>
    <p>$95.00</p>
    <button>Add to Cart</button>
  </div>

  <div>
    <img src="../images/black-hoodie.png" alt="Subliminal Hoodie">
    <h3>Subliminal Hoodie</h3>
    <p>$120</p>
  </div>

</section>
</header>
<div class="video-bg" style="z-index:-1;">
  <video autoplay muted loop playsinline style="width:100vw;height:100vh;object-fit:cover;min-width:100vw;min-height:100vh;position:absolute;top:0;left:0;z-index:-1;">
    <source src="../videos/bg.mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
